<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">A software pipeline has a prologue that fills it, a steady state where loads and computes overlap, and an epilogue that drains it</title>
  <desc id="d">A pipeline chart across five tile iterations with two engine rows, load and compute. The prologue, on the left, issues the first load with no compute yet, filling the pipe. The steady state, in the middle and marked by a green band, runs load of tile k plus one at the same time as compute of tile k, so both engines are busy every step. The epilogue, on the right, computes the last tile with no load left to issue, draining the pipe. The load row is always one step ahead of the compute row, which is what lets each load hide behind the previous compute.</desc>
  <style><![CDATA[
    :root{--ts-bg:#FAFAF7;--ts-surface:#FFFFFF;--ts-ink:#1A1A1A;--ts-ink-muted:#5C5C5C;--ts-border:#D9D9D4;--ts-primary:#5B7FBF;--ts-success:#5C9E78;--ts-grid:#E4E4DE;}
    @media (prefers-color-scheme:dark){:root{--ts-bg:#0E0F12;--ts-surface:#16181C;--ts-ink:#F2F2EE;--ts-ink-muted:#B4B4AE;--ts-border:#2A2D33;--ts-primary:#7E9CD0;--ts-success:#7FBF9B;--ts-grid:#23262D;}}
    .bg{fill:var(--ts-bg);}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:21px;fill:var(--ts-ink);}
    .label{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:13px;fill:var(--ts-ink);}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ts-ink-muted);}
    .mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:12px;fill:var(--ts-ink);}
    .load{fill:var(--ts-surface);stroke:var(--ts-primary);stroke-width:1.5;}
    .comp{fill:var(--ts-surface);stroke:var(--ts-ink-muted);stroke-width:1.5;}
    .band{fill:none;stroke:var(--ts-success);stroke-width:1.5;stroke-dasharray:5 3;}
    .phase{stroke:var(--ts-grid);stroke-width:0.75;stroke-dasharray:3 3;}
  ]]></style>
  <rect class="bg" width="960" height="540"/>
  <text class="title" x="40" y="42">A K-stage pipeline: prologue, steady state, epilogue</text>

  <!-- phase labels -->
  <text class="label" x="170" y="96" text-anchor="middle">prologue</text>
  <text class="small" x="170" y="116" text-anchor="middle">fill the pipe</text>
  <text class="label" x="500" y="96" text-anchor="middle">steady state</text>
  <text class="small" x="500" y="116" text-anchor="middle">load[k+1] overlaps compute[k]</text>
  <text class="label" x="830" y="96" text-anchor="middle">epilogue</text>
  <text class="small" x="830" y="116" text-anchor="middle">drain the pipe</text>

  <!-- phase dividers -->
  <line class="phase" x1="250" y1="140" x2="250" y2="400"/>
  <line class="phase" x1="750" y1="140" x2="750" y2="400"/>

  <!-- engine row labels -->
  <text class="small" x="40" y="214">load</text>
  <text class="small" x="40" y="294">compute</text>

  <!-- steady-state band -->
  <rect class="band" x="258" y="180" width="484" height="148" rx="6"/>
  <text class="small" x="500" y="352" text-anchor="middle" fill="var(--ts-success)">both engines busy every step</text>

  <!-- LOAD row: tiles 0..4, one step ahead -->
  <g>
    <rect class="load" x="120" y="190" width="120" height="34"/><text class="mono" x="180" y="212" text-anchor="middle">load 0</text>
    <rect class="load" x="270" y="190" width="120" height="34"/><text class="mono" x="330" y="212" text-anchor="middle">load 1</text>
    <rect class="load" x="420" y="190" width="120" height="34"/><text class="mono" x="480" y="212" text-anchor="middle">load 2</text>
    <rect class="load" x="570" y="190" width="120" height="34"/><text class="mono" x="630" y="212" text-anchor="middle">load 3</text>
    <rect class="load" x="720" y="190" width="120" height="34"/><text class="mono" x="780" y="212" text-anchor="middle">load 4</text>
  </g>

  <!-- COMPUTE row: tiles 0..4, one step behind -->
  <g>
    <rect class="comp" x="270" y="270" width="120" height="34"/><text class="mono" x="330" y="292" text-anchor="middle">comp 0</text>
    <rect class="comp" x="420" y="270" width="120" height="34"/><text class="mono" x="480" y="292" text-anchor="middle">comp 1</text>
    <rect class="comp" x="570" y="270" width="120" height="34"/><text class="mono" x="630" y="292" text-anchor="middle">comp 2</text>
    <rect class="comp" x="720" y="270" width="120" height="34"/><text class="mono" x="780" y="292" text-anchor="middle">comp 3</text>
    <rect class="comp" x="820" y="270" width="120" height="34"/><text class="mono" x="880" y="292" text-anchor="middle">comp 4</text>
  </g>

  <text class="small" x="40" y="440">The load row stays one step ahead of the compute row, so every load lands before its tile is needed.</text>
</svg>
