<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">The GPU programming abstraction ladder from raw CUDA up to PyTorch, trading control for ease</title>
  <desc id="d">Five rungs from bottom to top, with an axis on the left: lower means more control and more effort, higher means easier and more abstract. Bottom rung, raw CUDA C++, a global gemm kernel, total control but weeks of work and often only 60 percent of peak. Next, CUTLASS C++ templates, near-peak at 98 percent but days of work. Next, highlighted green, Triton, a Python just-in-time block-level kernel reaching about 95 percent of peak for hours of work, the sweet spot. Next, cuBLAS and cuDNN, a single library call at 100 percent but a black box. Top, PyTorch or JAX, torch.matmul, the easiest, calling the optimized libraries. The meta-lesson: you learned the bottom rung to understand and trust all the ones above it.</desc>
  <style><![CDATA[
    :root{--ts-bg:#FAFAF7;--ts-surface:#FFFFFF;--ts-ink:#1A1A1A;--ts-ink-muted:#5C5C5C;--ts-border:#D9D9D4;--ts-success:#5C9E78;--ts-grid:#E4E4DE;}
    @media (prefers-color-scheme:dark){:root{--ts-bg:#0E0F12;--ts-surface:#16181C;--ts-ink:#F2F2EE;--ts-ink-muted:#B4B4AE;--ts-border:#2A2D33;--ts-success:#7FBF9B;--ts-grid:#23262D;}}
    .bg{fill:var(--ts-bg);}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:21px;fill:var(--ts-ink);}
    .label{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:14px;fill:var(--ts-ink);}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ts-ink-muted);}
    .mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:12px;fill:var(--ts-ink);}
    .rung{fill:var(--ts-surface);stroke:var(--ts-ink-muted);stroke-width:1.5;}
    .hot{fill:var(--ts-surface);stroke:var(--ts-success);stroke-width:1.5;}
    .axis{stroke:var(--ts-ink-muted);stroke-width:1;fill:none;}
  ]]></style>
  <rect class="bg" width="960" height="540"/>
  <text class="title" x="40" y="40">Why nobody writes raw CUDA for matmul anymore</text>
  <text class="small" x="40" y="62">The same GEMM, five levels of abstraction: each rung up trades control for ease, at little or no loss of speed.</text>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--ts-ink-muted)"/></marker>
  </defs>

  <!-- axis -->
  <line class="axis" x1="74" y1="448" x2="74" y2="96" marker-end="url(#a)"/>
  <text class="small" x="92" y="106">easier, higher-level</text>
  <text class="small" x="92" y="444">more control, more effort</text>

  <!-- rungs: top (PyTorch) to bottom (raw CUDA) -->
  <rect class="rung" x="140" y="96"  width="780" height="58" rx="6"/>
  <text class="label" x="156" y="122">PyTorch / JAX</text><text class="mono" x="156" y="142">torch.matmul(A, B)</text><text class="small" x="904" y="130" text-anchor="end">easiest · calls the libraries</text>

  <rect class="rung" x="140" y="166" width="780" height="58" rx="6"/>
  <text class="label" x="156" y="192">cuBLAS / cuDNN</text><text class="mono" x="156" y="212">cublasGemmEx(...)</text><text class="small" x="904" y="200" text-anchor="end">100% peak · black box</text>

  <rect class="hot" x="140" y="236"  width="780" height="58" rx="6"/>
  <text class="label" x="156" y="262" fill="var(--ts-success)">Triton (Python DSL)</text><text class="mono" x="156" y="282">@triton.jit  # block-level</text><text class="small" x="904" y="270" text-anchor="end">~95% · hours · customizable</text>

  <rect class="rung" x="140" y="306" width="780" height="58" rx="6"/>
  <text class="label" x="156" y="332">CUTLASS (C++ templates)</text><text class="mono" x="156" y="352">cutlass::gemm::device::Gemm&lt;...&gt;</text><text class="small" x="904" y="340" text-anchor="end">98-100% · days · steep</text>

  <rect class="rung" x="140" y="376" width="780" height="58" rx="6"/>
  <text class="label" x="156" y="402">Raw CUDA C++</text><text class="mono" x="156" y="422">__global__ void gemm(...)</text><text class="small" x="904" y="410" text-anchor="end">total control · weeks · ~60%</text>

</svg>
