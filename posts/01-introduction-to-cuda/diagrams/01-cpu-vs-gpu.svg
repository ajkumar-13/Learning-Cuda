<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">A CPU spends its chip area on a few powerful cores plus large caches and control; a GPU spends almost all of it on many small cores</title>
  <desc id="d">Two panels comparing chip area. On the left, the CPU: four large cores filled in the compute colour sit beside a large cache block and above a wide control strip, both drawn in neutral grey. Most of the CPU's area is grey cache and control, which is how it makes a single thread fast. On the right, the GPU: a thin grey control strip on top, a thin grey L2 cache strip on the bottom, and between them a dense grid of many small cores, almost all filled in the compute colour. Almost all of the GPU's area is blue compute. The takeaway is that the GPU is not a faster CPU; it trades single-thread speed for running the same operation across thousands of elements at once.</desc>
  <style><![CDATA[
    :root{--ts-bg:#FAFAF7;--ts-surface:#FFFFFF;--ts-ink:#1A1A1A;--ts-ink-muted:#5C5C5C;--ts-border:#D9D9D4;--ts-primary:#5B7FBF;--ts-grid:#E4E4DE;}
    @media (prefers-color-scheme:dark){:root{--ts-bg:#0E0F12;--ts-surface:#16181C;--ts-ink:#F2F2EE;--ts-ink-muted:#B4B4AE;--ts-border:#2A2D33;--ts-primary:#8BA8E0;--ts-grid:#23262D;}}
    .bg{fill:var(--ts-bg);}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:21px;fill:var(--ts-ink);}
    .label{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:14px;fill:var(--ts-ink);}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ts-ink-muted);}
    .mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:12px;fill:var(--ts-primary);}
    .panel{fill:none;stroke:var(--ts-border);stroke-width:1;}
    .core{fill:var(--ts-primary);fill-opacity:0.18;stroke:var(--ts-primary);stroke-width:1.5;}
    .coreS{fill:var(--ts-primary);fill-opacity:0.18;stroke:var(--ts-primary);stroke-width:1;}
    .mem{fill:var(--ts-ink-muted);fill-opacity:0.12;stroke:var(--ts-border);stroke-width:1;}
  ]]></style>
  <rect class="bg" width="960" height="540"/>
  <text class="title" x="40" y="40">The GPU is not a faster CPU: it is mostly compute</text>

  <!-- CPU: a little compute (blue), mostly cache + control (grey) -->
  <rect class="panel" x="40" y="72" width="420" height="430" rx="10"/>
  <text class="label" x="60" y="104">CPU — a few powerful cores (latency)</text>
  <rect class="core" x="64"  y="120" width="92" height="90" rx="6"/><text class="mono" x="110" y="171" text-anchor="middle">core</text>
  <rect class="core" x="168" y="120" width="92" height="90" rx="6"/><text class="mono" x="214" y="171" text-anchor="middle">core</text>
  <rect class="core" x="64"  y="222" width="92" height="90" rx="6"/><text class="mono" x="110" y="273" text-anchor="middle">core</text>
  <rect class="core" x="168" y="222" width="92" height="90" rx="6"/><text class="mono" x="214" y="273" text-anchor="middle">core</text>
  <rect class="mem" x="276" y="120" width="160" height="192" rx="6"/><text class="small" x="356" y="206" text-anchor="middle">Cache</text><text class="small" x="356" y="224" text-anchor="middle">L1 / L2 / L3</text>
  <rect class="mem" x="64" y="330" width="372" height="150" rx="6"/><text class="small" x="250" y="400" text-anchor="middle">Control</text><text class="small" x="250" y="420" text-anchor="middle">branch prediction, out-of-order execution</text>

  <!-- GPU: almost all compute (a dense grid of blue cores), thin grey control + L2 -->
  <rect class="panel" x="500" y="72" width="420" height="430" rx="10"/>
  <text class="label" x="520" y="104">GPU — thousands of small cores (throughput)</text>
  <rect class="mem" x="520" y="120" width="380" height="26" rx="4"/><text class="small" x="710" y="138" text-anchor="middle">Control (small)</text>
  <g>
    <rect class="coreS" x="520" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="552" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="584" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="616" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="648" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="680" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="712" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="744" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="776" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="808" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="840" y="158" width="27" height="38" rx="2"/><rect class="coreS" x="872" y="158" width="27" height="38" rx="2"/>
    <rect class="coreS" x="520" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="552" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="584" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="616" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="648" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="680" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="712" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="744" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="776" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="808" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="840" y="204" width="27" height="38" rx="2"/><rect class="coreS" x="872" y="204" width="27" height="38" rx="2"/>
    <rect class="coreS" x="520" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="552" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="584" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="616" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="648" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="680" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="712" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="744" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="776" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="808" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="840" y="250" width="27" height="38" rx="2"/><rect class="coreS" x="872" y="250" width="27" height="38" rx="2"/>
    <rect class="coreS" x="520" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="552" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="584" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="616" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="648" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="680" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="712" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="744" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="776" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="808" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="840" y="296" width="27" height="38" rx="2"/><rect class="coreS" x="872" y="296" width="27" height="38" rx="2"/>
    <rect class="coreS" x="520" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="552" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="584" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="616" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="648" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="680" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="712" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="744" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="776" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="808" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="840" y="342" width="27" height="38" rx="2"/><rect class="coreS" x="872" y="342" width="27" height="38" rx="2"/>
    <rect class="coreS" x="520" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="552" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="584" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="616" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="648" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="680" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="712" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="744" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="776" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="808" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="840" y="388" width="27" height="38" rx="2"/><rect class="coreS" x="872" y="388" width="27" height="38" rx="2"/>
  </g>
  <rect class="mem" x="520" y="448" width="380" height="26" rx="4"/><text class="small" x="710" y="466" text-anchor="middle">L2 cache</text>
</svg>
