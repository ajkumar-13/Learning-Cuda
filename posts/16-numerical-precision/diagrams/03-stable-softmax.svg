<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">Naive softmax overflows to inf then nan; subtracting the row max keeps every value finite</title>
  <desc id="d">Two softmax pipelines on the same score vector 2, 3, 1000, 1001. The left, naive path applies exp directly, so the large scores overflow to inf and the normalization yields nan, both drawn in red. The right, stable path first subtracts the row maximum 1001, so the largest exponent becomes exp of zero equals one and every intermediate value stays finite, drawn green, reaching the correct probabilities 0, 0, 0.27, 0.73.</desc>
  <style><![CDATA[
    :root{--ts-bg:#FAFAF7;--ts-surface:#FFFFFF;--ts-ink:#1A1A1A;--ts-ink-muted:#5C5C5C;--ts-border:#D9D9D4;--ts-success:#5C9E78;--ts-alert:#C66B5E;--ts-grid:#E4E4DE;}
    @media (prefers-color-scheme:dark){:root{--ts-bg:#0E0F12;--ts-surface:#16181C;--ts-ink:#F2F2EE;--ts-ink-muted:#B4B4AE;--ts-border:#2A2D33;--ts-success:#7FBF9B;--ts-alert:#D88880;--ts-grid:#23262D;}}
    .bg{fill:var(--ts-bg);}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:21px;fill:var(--ts-ink);}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ts-ink-muted);}
    .label{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:14px;fill:var(--ts-ink);}
    .box{fill:var(--ts-surface);stroke:var(--ts-border);stroke-width:1;}
    .mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--ts-ink);}
    .boxR{fill:var(--ts-surface);stroke:var(--ts-alert);stroke-width:1.5;}
    .boxG{fill:var(--ts-surface);stroke:var(--ts-success);stroke-width:1.5;}
    .monoR{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:600;font-size:13px;fill:var(--ts-alert);}
    .monoG{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:600;font-size:13px;fill:var(--ts-success);}
    .arr{stroke:var(--ts-ink-muted);stroke-width:1.5;fill:none;}
  ]]></style>
  <rect class="bg" width="960" height="540"/>
  <text class="title" x="40" y="42">Stable softmax: subtract the row max before exp()</text>
  <text class="small" x="40" y="64">Input scores x = [2, 3, 1000, 1001]. Same probabilities, but only one path survives.</text>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--ts-ink-muted)"/></marker>
  </defs>

  <!-- LEFT: naive -->
  <text class="label" x="90" y="108">naive: exp(x) directly</text>
  <rect class="box" x="90" y="122" width="320" height="40" rx="4"/><text class="mono" x="250" y="147" text-anchor="middle">exp([2, 3, 1000, 1001])</text>
  <path class="arr" d="M250,166 L250,200" marker-end="url(#a)"/>
  <rect class="boxR" x="90" y="206" width="320" height="40" rx="4"/><text class="monoR" x="250" y="231" text-anchor="middle">[ e^2, e^3, inf, inf ]</text>
  <path class="arr" d="M250,250 L250,284" marker-end="url(#a)"/>
  <rect class="boxR" x="90" y="290" width="320" height="40" rx="4"/><text class="monoR" x="250" y="315" text-anchor="middle">normalize -&gt; [0, 0, nan, nan]</text>
  <text class="monoR" x="90" y="360">inf / inf = nan: the row is destroyed</text>

  <!-- RIGHT: stable -->
  <text class="label" x="550" y="108">stable: subtract max M = 1001</text>
  <rect class="box" x="550" y="122" width="320" height="40" rx="4"/><text class="mono" x="710" y="147" text-anchor="middle">exp([-999, -998, -1, 0])</text>
  <path class="arr" d="M710,166 L710,200" marker-end="url(#a)"/>
  <rect class="boxG" x="550" y="206" width="320" height="40" rx="4"/><text class="monoG" x="710" y="231" text-anchor="middle">[ ~0, ~0, 0.368, 1.0 ]</text>
  <path class="arr" d="M710,250 L710,284" marker-end="url(#a)"/>
  <rect class="boxG" x="550" y="290" width="320" height="40" rx="4"/><text class="monoG" x="710" y="315" text-anchor="middle">normalize -&gt; [0, 0, 0.269, 0.731]</text>
  <text class="monoG" x="550" y="360">largest exponent is exp(0) = 1: all finite</text>

  <text class="small" x="40" y="410">Multiplying top and bottom by e^(-M) leaves the ratio unchanged, so the answer is identical.</text>
</svg>
