<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="t d">
  <title id="t">The roofline: a sloped memory-bound region rising to a flat compute-bound ceiling</title>
  <desc id="d">A log-log performance roof. The horizontal axis is arithmetic intensity in floating-point operations per byte; the vertical axis is achieved performance. A line rises from the lower left at a constant slope, the memory-bound region, where performance is limited by bandwidth and grows with intensity. At a ridge point it bends to horizontal, the compute-bound ceiling set by peak floating-point throughput. Two kernels are plotted. Vector-add sits far left on the steep slope, deep in the memory-bound region near peak bandwidth, drawn in blue as the canonical memory-bound kernel. Tiled matrix multiply sits near the ridge, drawn in green as the kernel that tiling pushed rightward from memory-bound toward compute-bound. The takeaway is that a kernel's intensity decides which roof it lives under.</desc>
  <style><![CDATA[
    :root{--ts-bg:#FAFAF7;--ts-surface:#FFFFFF;--ts-ink:#1A1A1A;--ts-ink-muted:#5C5C5C;--ts-border:#D9D9D4;--ts-primary:#5B7FBF;--ts-success:#5C9E78;--ts-grid:#E4E4DE;}
    @media (prefers-color-scheme:dark){:root{--ts-bg:#0E0F12;--ts-surface:#16181C;--ts-ink:#F2F2EE;--ts-ink-muted:#B4B4AE;--ts-border:#2A2D33;--ts-primary:#8BA8E0;--ts-success:#7FBF9B;--ts-grid:#23262D;}}
    .bg{fill:var(--ts-bg);}
    .title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:21px;fill:var(--ts-ink);}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:12px;fill:var(--ts-ink-muted);}
    .label{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:13px;fill:var(--ts-ink);}
    .axis{stroke:var(--ts-ink);stroke-width:1.5;}
    .grid{stroke:var(--ts-grid);stroke-width:0.75;}
    .roof{stroke:var(--ts-ink);stroke-width:1.5;fill:none;}
    .dotP{fill:var(--ts-surface);stroke:var(--ts-primary);stroke-width:1.5;}
    .dotG{fill:var(--ts-surface);stroke:var(--ts-success);stroke-width:1.5;}
    .lblP{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:13px;fill:var(--ts-primary);}
    .lblG{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:13px;fill:var(--ts-success);}
    .ridge{stroke:var(--ts-ink-muted);stroke-width:1;stroke-dasharray:4 3;fill:none;}
  ]]></style>
  <rect class="bg" width="960" height="540"/>
  <text class="title" x="40" y="44">The roofline: which roof does the kernel live under?</text>
  <text class="small" x="40" y="66">Low intensity is bandwidth-bound (the slope); high intensity is compute-bound (the flat ceiling).</text>

  <!-- plot frame -->
  <line class="axis" x1="140" y1="440" x2="860" y2="440"/>
  <line class="axis" x1="140" y1="440" x2="140" y2="110"/>
  <!-- light grid -->
  <g class="grid">
    <line x1="300" y1="110" x2="300" y2="440"/>
    <line x1="460" y1="110" x2="460" y2="440"/>
    <line x1="620" y1="110" x2="620" y2="440"/>
    <line x1="780" y1="110" x2="780" y2="440"/>
    <line x1="140" y1="360" x2="860" y2="360"/>
    <line x1="140" y1="270" x2="860" y2="270"/>
    <line x1="140" y1="180" x2="860" y2="180"/>
  </g>

  <!-- axis labels -->
  <text class="label" x="500" y="486" text-anchor="middle">arithmetic intensity  (FLOP / byte, log scale)</text>
  <text class="label" x="40" y="280" text-anchor="middle" transform="rotate(-90 40 280)">performance (log)</text>

  <!-- roofline: sloped memory-bound part then flat compute ceiling -->
  <path class="roof" d="M150,420 L520,150 L860,150"/>
  <!-- ridge marker -->
  <line class="ridge" x1="520" y1="150" x2="520" y2="440"/>
  <text class="small" x="520" y="458" text-anchor="middle">ridge point</text>
  <text class="small" x="360" y="285" text-anchor="middle" transform="rotate(-36 360 285)">memory-bound region</text>
  <text class="small" x="690" y="142" text-anchor="middle">compute-bound (peak FLOP/s)</text>

  <!-- vector-add: far left on the slope, near the roof -->
  <circle class="dotP" cx="225" cy="380" r="8"/>
  <text class="lblP" x="240" y="376">vector-add</text>
  <text class="small" x="240" y="394">memory-bound, near peak BW</text>

  <!-- tiled matmul: near the ridge -->
  <circle class="dotG" cx="500" cy="168" r="8"/>
  <text class="lblG" x="540" y="182">tiled matmul</text>
  <text class="small" x="540" y="200">tiling reached the ridge</text>
</svg>
